[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/task-manager run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
